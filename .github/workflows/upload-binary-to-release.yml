name: Upload Binary to Release

on:
    release:
        types: [published]

permissions:
    contents: write

defaults:
    run:
        working-directory: cli

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout release tag
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.release.tag_name }}

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: cli/go.mod

            - name: Build binary
              env:
                  GOOS: darwin
                  GOARCH: arm64
                  CGO_ENABLED: "0"
              run: go build -trimpath -ldflags="-s -w" -o bootstrap-darwin-arm64 .

            - name: Upload binary to release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload ${{ github.event.release.tag_name }} bootstrap-darwin-arm64 --clobber
